# ─────────────────────────────────────────────────────────────
# HNG Stage 3 — Nginx Reverse Proxy Config
# ─────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's internal DNS — resolves service names at request time
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Real IP fallback map ──────────────────────────────────
    # If X-Forwarded-For is present use it, else fall back to direct IP
    # WITH THIS — handles absent, empty string, and whitespace
    map $http_x_forwarded_for $real_client_ip {
        ""        $remote_addr;
        "~^\s*$"  $remote_addr;
        default   $http_x_forwarded_for;
    }

    # ── JSON Log Format ───────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"source_ip":"$real_client_ip",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"referrer":"$http_referer"'
        '}';

    # ── Write JSON logs to named volume path ──────────────────
    access_log  /var/log/nginx/hng-access.log  json_combined;

    # ── Performance Settings ──────────────────────────────────
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 512M;

    # ── Trust X-Forwarded-For from Docker networks ────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Main Server Block ─────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        # ── Security Headers ──────────────────────────────────
        add_header X-Content-Type-Options            nosniff;
        add_header X-XSS-Protection                  "1; mode=block";
        add_header X-Robots-Tag                      none;
        add_header X-Download-Options                noopen;
        add_header X-Permitted-Cross-Domain-Policies none;
        add_header Referrer-Policy                   no-referrer;

        # ── Forward Real IP Headers to Nextcloud ──────────────
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # ── Proxy Timeouts ────────────────────────────────────
        proxy_connect_timeout   60s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        # ── Proxy Buffer Settings ─────────────────────────────
        proxy_buffering         on;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        # ── Static / Special Paths ────────────────────────────
        location = /robots.txt {
            allow all;
            log_not_found off;
            access_log off;
        }

        location ^~ /.well-known {
            location = /.well-known/carddav {
                return 301 /remote.php/dav/;
            }
            location = /.well-known/caldav {
                return 301 /remote.php/dav/;
            }
            location ^~ /.well-known {
                return 301 /index.php$uri;
            }
            try_files $uri $uri/ =404;
        }

        # Block sensitive Nextcloud internals
        location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) {
            return 404;
        }
        location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
            return 404;
        }

        # ── Main Proxy Pass ───────────────────────────────────
        location / {
            proxy_pass         http://nextcloud:80;
            proxy_redirect     off;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
